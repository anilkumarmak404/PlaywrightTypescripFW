name: Maintenance Agent

on:
  schedule:
    # 03:30 UTC = 09:00 IST daily
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  maintenance:
    name: Daily maintenance scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      ENV_NAME: demo
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Maintenance Agent
        run: npm run agent:maintenance

      - name: Upload maintenance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-agent-state
          retention-days: 14
          path: |
            agent-state
